# Apache Production Configuration for RTRS (IP-based access)
# Copy to /etc/apache2/sites-available/rtrs-ip.conf

<VirtualHost *:80>
    ServerName localhost
    ServerAlias *

    # No SSL redirect - direct IP access

    # Security headers (requires mod_headers)
    <IfModule mod_headers.c>
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

    # Gzip compression
    <IfModule mod_deflate.c>
        <Location />
            AddOutputFilterByType DEFLATE text/plain
            AddOutputFilterByType DEFLATE text/css
            AddOutputFilterByType DEFLATE application/json
            AddOutputFilterByType DEFLATE application/javascript
            AddOutputFilterByType DEFLATE text/xml
            AddOutputFilterByType DEFLATE application/xml
        </Location>
    </IfModule>

    # Socket.io support — MUST come before ProxyPass /
    ProxyPassMatch "^/socket.io/(.*)" ws://127.0.0.1:8000/socket.io/$1
    ProxyPassReverse /socket.io/ ws://127.0.0.1:8000/socket.io/

    # Backend API - Proxy to Node.js (use 127.0.0.1 for IPv4)
    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8000/api nocanon
    ProxyPassReverse /api http://127.0.0.1:8000/api

    # Frontend - Proxy to serve
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/rtrs-error.log
    CustomLog ${APACHE_LOG_DIR}/rtrs-access.log combined
</VirtualHost>
