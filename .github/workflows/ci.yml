name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: back-end/package-lock.json
      - run: cd back-end && npm ci
      - run: cd back-end && npx jest --silent
      - run: cd back-end && npx sequelize db:migrate

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: front-end/package-lock.json
      - run: cd front-end && npm ci
      - run: cd front-end && npx vue-tsc --noEmit
      - run: cd front-end && npm run build

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript, php
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:php"
