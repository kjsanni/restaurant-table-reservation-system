name: CI

on:
  push:
    branches: [ main, Features ]
  pull_request:
    branches: [ main, Features ]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: back-end/package-lock.json
      - name: Install backend dependencies
        working-directory: ./back-end
        run: npm ci
      - name: Run backend tests
        working-directory: ./back-end
        run: npm test
        env:
          NODE_ENV: test
      - name: Security audit
        working-directory: ./back-end
        run: npm audit --audit-level=high || true

  frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./front-end
        run: npm ci
      - name: Lint
        working-directory: ./front-end
        run: npm run lint
      - name: Run frontend tests
        working-directory: ./front-end
        run: npm run test:unit
      - name: Build
        working-directory: ./front-end
        run: npm run build
      - name: Security audit
        working-directory: ./front-end
        run: npm audit --audit-level=high || true

  security-sast:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Run ESLint security checks
        run: |
          npm install -g eslint eslint-plugin-security
          eslint back-end/src --ext .js --plugin security --rule 'security/detect-object-injection: warn' --rule 'security/detect-non-literal-require: warn' || true
      - name: Check for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-check:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit for both packages
        run: |
          echo "=== Backend Audit ==="
          cd back-end && npm audit --json || true
          echo "=== Frontend Audit ==="
          cd ../front-end && npm audit --json || true

  snyk:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ secrets.SNYK_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}