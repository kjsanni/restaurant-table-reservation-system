version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secure-password}
      MYSQL_DATABASE: ${DB_NAME:-rtrs_production}
      MYSQL_USER: ${DB_USERNAME:-rtrs_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secure-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: back-end/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-rtrs_production}
      DB_USERNAME: ${DB_USERNAME:-rtrs_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure-password}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TENANT_MODE: ${TENANT_MODE:-disabled}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: front-end/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
